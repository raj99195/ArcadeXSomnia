<svg width="680" height="700" viewBox="0 0 680 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="680" height="700" fill="#08070f"/>

  <!-- Creator connects wallet -->
  <rect x="220" y="20" width="240" height="44" rx="8" fill="#1a1530" stroke="#7B2FFF" stroke-width="1"/>
  <text font-family="Arial,sans-serif" font-size="13" font-weight="600" x="340" y="47" text-anchor="middle" fill="#c4a0ff">Creator connects wallet</text>
  <line x1="340" y1="64" x2="340" y2="90" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- init_creator -->
  <rect x="190" y="90" width="300" height="56" rx="8" fill="#1a1530" stroke="#7B2FFF" stroke-width="1"/>
  <text font-family="Arial,sans-serif" font-size="13" font-weight="600" x="340" y="110" text-anchor="middle" fill="#c4a0ff">init_creator()</text>
  <text font-family="Arial,sans-serif" font-size="11" x="340" y="130" text-anchor="middle" fill="#7755aa">On-chain creator account created</text>
  <line x1="340" y1="146" x2="340" y2="172" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Fill form -->
  <rect x="180" y="172" width="320" height="56" rx="8" fill="#0d1a15" stroke="#00d4aa" stroke-width="1"/>
  <text font-family="Arial,sans-serif" font-size="13" font-weight="600" x="340" y="192" text-anchor="middle" fill="#00d4aa">Fill game form</text>
  <text font-family="Arial,sans-serif" font-size="11" x="340" y="212" text-anchor="middle" fill="#00a080">Name, iframe URL, reward rate</text>
  <line x1="340" y1="228" x2="340" y2="254" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- register_game -->
  <rect x="180" y="254" width="320" height="56" rx="8" fill="#0d1a15" stroke="#00d4aa" stroke-width="1"/>
  <text font-family="Arial,sans-serif" font-size="13" font-weight="600" x="340" y="274" text-anchor="middle" fill="#00d4aa">register_game()</text>
  <text font-family="Arial,sans-serif" font-size="11" x="340" y="294" text-anchor="middle" fill="#00a080">Game stored on-chain — pending</text>
  <line x1="340" y1="310" x2="340" y2="336" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- approve_game -->
  <rect x="190" y="336" width="300" height="56" rx="8" fill="#1a1508" stroke="#FFB800" stroke-width="1"/>
  <text font-family="Arial,sans-serif" font-size="13" font-weight="600" x="340" y="356" text-anchor="middle" fill="#FFB800">Admin: approve_game()</text>
  <text font-family="Arial,sans-serif" font-size="11" x="340" y="376" text-anchor="middle" fill="#cc9000">Game goes live in arcade</text>
  <line x1="340" y1="392" x2="340" y2="418" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Player plays -->
  <rect x="190" y="418" width="300" height="56" rx="8" fill="#111118" stroke="#444" stroke-width="1"/>
  <text font-family="Arial,sans-serif" font-size="13" font-weight="600" x="340" y="438" text-anchor="middle" fill="#aaa">Player plays → GAME_OVER</text>
  <text font-family="Arial,sans-serif" font-size="11" x="340" y="458" text-anchor="middle" fill="#666">submit_score() on-chain</text>
  <line x1="340" y1="474" x2="340" y2="500" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Platform calculates -->
  <rect x="190" y="500" width="300" height="56" rx="8" fill="#111118" stroke="#444" stroke-width="1"/>
  <text font-family="Arial,sans-serif" font-size="13" font-weight="600" x="340" y="520" text-anchor="middle" fill="#aaa">Platform calculates rewards</text>
  <text font-family="Arial,sans-serif" font-size="11" x="340" y="540" text-anchor="middle" fill="#666">Player 80% · Creator 20%</text>

  <!-- Split -->
  <line x1="280" y1="556" x2="150" y2="604" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="556" x2="530" y2="604" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Player ARCADE -->
  <rect x="50" y="604" width="200" height="56" rx="8" fill="#0d1a15" stroke="#00d4aa" stroke-width="1"/>
  <text font-family="Arial,sans-serif" font-size="13" font-weight="600" x="150" y="624" text-anchor="middle" fill="#00d4aa">+ARCADE → Player</text>
  <text font-family="Arial,sans-serif" font-size="11" x="150" y="644" text-anchor="middle" fill="#00a080">80% of reward rate</text>

  <!-- Creator ARCADE -->
  <rect x="430" y="604" width="200" height="56" rx="8" fill="#1a1530" stroke="#7B2FFF" stroke-width="1"/>
  <text font-family="Arial,sans-serif" font-size="13" font-weight="600" x="530" y="624" text-anchor="middle" fill="#c4a0ff">+ARCADE → Creator</text>
  <text font-family="Arial,sans-serif" font-size="11" x="530" y="644" text-anchor="middle" fill="#7755aa">20% of reward rate</text>
</svg>
