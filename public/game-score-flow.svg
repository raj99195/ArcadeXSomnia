<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="680" height="620" fill="#08070f"/>

  <!-- Player plays game -->
  <rect x="240" y="30" width="200" height="44" rx="8" fill="#1a1530" stroke="#7B2FFF" stroke-width="1"/>
  <text font-family="Arial,sans-serif" font-size="13" font-weight="600" x="340" y="57" text-anchor="middle" fill="#c4a0ff">Player plays game</text>

  <line x1="340" y1="74" x2="340" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- arcade_gameOver -->
  <rect x="190" y="100" width="300" height="56" rx="8" fill="#1a1530" stroke="#7B2FFF" stroke-width="1"/>
  <text font-family="Arial,sans-serif" font-size="13" font-weight="600" x="340" y="120" text-anchor="middle" fill="#c4a0ff">arcade_gameOver(score)</text>
  <text font-family="Arial,sans-serif" font-size="11" x="340" y="140" text-anchor="middle" fill="#7755aa">Unity C# calls arcade-sdk.js</text>

  <line x1="340" y1="156" x2="340" y2="182" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- GAME_OVER event -->
  <rect x="200" y="182" width="280" height="56" rx="8" fill="#0d1a15" stroke="#00d4aa" stroke-width="1"/>
  <text font-family="Arial,sans-serif" font-size="13" font-weight="600" x="340" y="202" text-anchor="middle" fill="#00d4aa">postMessage(GAME_OVER)</text>
  <text font-family="Arial,sans-serif" font-size="11" x="340" y="222" text-anchor="middle" fill="#00a080">React frontend receives event</text>

  <line x1="340" y1="238" x2="340" y2="264" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Writing on chain -->
  <rect x="220" y="264" width="240" height="44" rx="8" fill="#111118" stroke="#444" stroke-width="1"/>
  <text font-family="Arial,sans-serif" font-size="13" font-weight="600" x="340" y="291" text-anchor="middle" fill="#aaa">Shows "Writing on chain..."</text>

  <line x1="340" y1="308" x2="340" y2="334" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision diamond -->
  <polygon points="340,334 440,378 340,422 240,378" fill="#111118" stroke="#666" stroke-width="1"/>
  <text font-family="Arial,sans-serif" font-size="13" font-weight="600" x="340" y="378" text-anchor="middle" dominant-baseline="central" fill="#ccc">Auto-sign ON?</text>

  <!-- YES branch -->
  <line x1="240" y1="378" x2="110" y2="378" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="Arial,sans-serif" font-size="11" x="178" y="368" text-anchor="middle" fill="#00d4aa">YES</text>

  <rect x="20" y="412" width="180" height="56" rx="8" fill="#0d1a15" stroke="#00d4aa" stroke-width="1"/>
  <text font-family="Arial,sans-serif" font-size="13" font-weight="600" x="110" y="432" text-anchor="middle" fill="#00d4aa">submitTxBlock</text>
  <text font-family="Arial,sans-serif" font-size="11" x="110" y="452" text-anchor="middle" fill="#00a080">Silent tx — no popup</text>

  <!-- NO branch -->
  <line x1="440" y1="378" x2="570" y2="378" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="Arial,sans-serif" font-size="11" x="502" y="368" text-anchor="middle" fill="#ff6b6b">NO</text>

  <rect x="480" y="412" width="180" height="56" rx="8" fill="#1a0d0d" stroke="#ff4444" stroke-width="1"/>
  <text font-family="Arial,sans-serif" font-size="13" font-weight="600" x="570" y="432" text-anchor="middle" fill="#ff6b6b">requestTxBlock</text>
  <text font-family="Arial,sans-serif" font-size="11" x="570" y="452" text-anchor="middle" fill="#cc3333">Wallet popup shown</text>

  <!-- Converge -->
  <line x1="110" y1="468" x2="110" y2="520" stroke="#555" stroke-width="1.5"/>
  <line x1="570" y1="468" x2="570" y2="520" stroke="#555" stroke-width="1.5"/>
  <line x1="110" y1="520" x2="570" y2="520" stroke="#555" stroke-width="1.5"/>
  <line x1="340" y1="520" x2="340" y2="548" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- TX confirmed -->
  <rect x="150" y="548" width="380" height="44" rx="8" fill="#0d1a15" stroke="#00d4aa" stroke-width="1"/>
  <text font-family="Arial,sans-serif" font-size="13" font-weight="600" x="340" y="575" text-anchor="middle" fill="#00d4aa">TX confirmed on initia-arcade-1 ✓</text>
</svg>
